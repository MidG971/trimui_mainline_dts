%YAML 1.2
---
$id: http://devicetree.org/schemas/pwm/allwinner,sun20i-d1-pwm.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Allwinner D1/A523 PWM (PWM-v2)

maintainers:
  - Midgy BALON <midgy971@gmail.com>

description:
  The "PWM-v2" controller found on the Allwinner D1/T113 (sun20i) and
  A523/A527/T527 (sun55iw3) SoCs. Unlike the older sun4i PWM it is clocked from
  three inputs (bus gate, HOSC and APB0) and exposes a configurable number of
  channels selected per board via the "allwinner,pwm-channels" property.

properties:
  compatible:
    enum:
      - allwinner,sun20i-d1-pwm
      - allwinner,sun55i-a523-pwm

  reg:
    maxItems: 1

  clocks:
    items:
      - description: Bus/gating clock
      - description: High-frequency oscillator (HOSC, 24 MHz)
      - description: APB0 clock

  clock-names:
    items:
      - const: bus
      - const: hosc
      - const: apb0

  resets:
    maxItems: 1

  "#pwm-cells":
    const: 3

  allwinner,pwm-channels:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Number of PWM channels provided by the controller.
    minimum: 1
    maximum: 16
    default: 8

required:
  - compatible
  - reg
  - clocks
  - clock-names
  - resets
  - "#pwm-cells"

allOf:
  - $ref: pwm.yaml#

additionalProperties: false

examples:
  - |
    #include <dt-bindings/clock/sun55i-a523-ccu.h>
    #include <dt-bindings/reset/sun55i-a523-ccu.h>

    pwm@2000c00 {
        compatible = "allwinner,sun55i-a523-pwm";
        reg = <0x02000c00 0x400>;
        clocks = <&ccu CLK_BUS_PWM0>, <&osc24M>, <&ccu CLK_APB0>;
        clock-names = "bus", "hosc", "apb0";
        resets = <&ccu RST_BUS_PWM0>;
        allwinner,pwm-channels = <16>;
        #pwm-cells = <3>;
    };
...
